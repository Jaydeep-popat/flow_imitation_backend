name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build TypeScript
        run: npm run build

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/flow_imitation_backend

            git rev-parse HEAD > /home/${{ secrets.SERVER_USER }}/.last_good_deploy

            git pull origin main

            npm run production

            npx prisma migrate deploy

            pm2 reload flow-imitation-backend --update-env

            for i in $(seq 1 6); do
              sleep 5
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
              if [ "$STATUS" = "200" ]; then
                echo "Deploy successful!"
                exit 0
              fi
              echo "Attempt $i: got $STATUS..."
            done

            echo "Health check failed! Rolling back..."
            PREV=$(cat /home/${{ secrets.SERVER_USER }}/.last_good_deploy)
            git checkout $PREV
            npm run production
            pm2 reload flow-imitation-backend --update-env
            echo "Rolled back to $PREV"
            exit 1